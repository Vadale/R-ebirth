# Runs R CMD check on the `relm` package (which builds its native Rust core
# via cargo). Modeled on https://github.com/r-lib/actions/tree/v2/examples.
# Downloads no models: the scaffold has no model-dependent code or tests.
on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        # R-oldrel is intentionally omitted for now: the package declares
        # Depends: R (>= 4.5.0), and while the current release is 4.5.x the
        # oldrel series (4.4.x) is below that floor. Add oldrel back once the
        # release line reaches 4.6 (the dev target), when oldrel becomes 4.5.x.
        config:
          - {os: macos-15,     r: 'release'}
          - {os: ubuntu-24.04, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      CMAKE_C_COMPILER_LAUNCHER: "sccache"
      CMAKE_CXX_COMPILER_LAUNCHER: "sccache"

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Compiler cache (see env): routes the vendored llama.cpp cmake build and
      # rustc through sccache so the C++ engine isn't recompiled from scratch each
      # run. Content-keyed, so it survives R CMD check's temp build dir + cleanup.
      - name: sccache (compiler cache)
        uses: mozilla-actions/sccache-action@v0.0.10

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
          working-directory: rebirth

      # Model-free demo-utils self-test (D-020 / D-022): the base-R AUC/CI helpers
      # and the WP7.5b analysis helpers (dose-response CI, cosine matrix, truncated
      # KL, colour-strip legend breaks, ...) are guarded by an executable self-test
      # that runs on source(). It needs no model and no built package, so it runs
      # here per-commit -- the demos' numeric core is checked on every push.
      - name: demo-utils self-test (model-free)
        run: Rscript -e 'source("tests/demos/demo-utils.R")'

      # Model-free smoke test of Demo B's B1-B4 figure code (D-022): synthesizes
      # coordinates/clusters/embeddings/texts (no model, no uwot/dbscan) and renders
      # every analysis to a headless PDF, so a base-graphics regression in the extended
      # topic figures is caught per-commit (the nightly exercises them on a real model).
      - name: demo-B plot self-test (model-free)
        run: Rscript -e 'Sys.setenv(RELM_DEMO_NO_AUTORUN="1"); source("tests/demos/demo-B-topics.R"); demo_B_plot_selftest(verbose=TRUE)'

      # The COMMITTED golden sidecars, verified from the checkout (D-026 fifth
      # addendum). The testthat suite cannot do this per-commit: the goldens live
      # at the repo root, outside the built tarball, so under R CMD check that
      # test skips -- and a skip is the wrong answer for the one check that
      # validates the real artifact rather than the mechanism. Re-recording a
      # golden and forgetting its sidecar would then merge green and surface only
      # in that night's vision job.
      #
      # Possible only because verify_golden_sidecar() takes explicit paths: it
      # needs no testthat context, no built package, and no model, so the real
      # function runs here on the real files -- no reimplementation in shell, and
      # therefore no R-vs-shell twin to drift (rule 8f).
      - name: committed golden sidecars (model-free)
        shell: bash
        run: |
          Rscript - <<'RS'
          source("rebirth/tests/testthat/helper-llm.R")
          # The annotation must be emitted BEFORE stop(): R prefixes its own
          # "Error: ", so a ::error:: inside the message never starts a line and
          # GitHub never parses it. Exit 1 is what actually gates; this only buys
          # the PR-UI annotation.
          fail <- function(...) {
            msg <- sprintf(...)
            cat(sprintf("::error::%s\n", msg), file = stderr())
            stop(msg, call. = FALSE)
          }
          sidecars <- Sys.glob("tests/llm-golden/*/goldens/*.machine")
          # A gate that silently verifies zero files is the failure this step is about.
          if (length(sidecars) == 0L) fail("no golden sidecars found; the glob is wrong or they were deleted")
          for (s in sidecars) {
            golden <- sub("\\.machine$", "", s)
            # verify_golden_sidecar() deliberately tolerates an absent golden (so
            # R CMD check does not break), so the orphan case is caught here.
            if (!file.exists(golden)) fail("orphan sidecar '%s': its golden '%s' does not exist", s, golden)
            # Errors loudly on a stale or digest-less sidecar; that is the gate.
            # Wrapped, not called bare: those stops are raised INSIDE the helper,
            # so without this they would exit 1 (the gate holds) but never reach
            # fail() and never annotate -- an annotator covering four of six
            # failure modes, silently missing the two that matter most.
            machine <- tryCatch(
              verify_golden_sidecar(golden, s),
              error = function(e) fail("%s", conditionMessage(e))
            )
            if (is.na(machine) || !nzchar(machine)) fail("sidecar '%s' names no machine", s)
            # UNKNOWN_CPU comes from the sourced helper, never retyped here: a
            # bare literal would keep "passing" if the sentinel were renamed.
            if (grepl(UNKNOWN_CPU, machine, fixed = TRUE)) {
              fail("sidecar '%s' records '%s', which is not an identity: two unrelated machines would match it", s, UNKNOWN_CPU)
            }
            cat(sprintf("verified %s -> %s\n", basename(golden), machine))
          }
          cat(sprintf("%d golden sidecar(s) verified against their goldens\n", length(sidecars)))
          RS

      # Lint the R-boundary crate here rather than in rust.yaml: rebirth-ffi's
      # build needs R on the PATH (provided by the steps above). rust.yaml lints
      # the R-free rebirth-llm.
      - name: clippy (rebirth-ffi, the R boundary crate)
        run: cargo clippy -p rebirth-ffi --all-targets -- -D warnings
        working-directory: rebirth/src/rust

      # Run rebirth-ffi's own tests here too (R on the PATH links the crate): the
      # ARCHITECTURE §4 index-conversion property tests and the P-4 boundary-guard
      # reject tests live in this crate and otherwise run nowhere in CI (rust.yaml
      # is R-free and cannot build rebirth-ffi).
      - name: cargo test (rebirth-ffi, the R boundary crate)
        run: cargo test -p rebirth-ffi
        working-directory: rebirth/src/rust

      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: rebirth
          args: 'c("--no-manual")'
          error-on: '"warning"'
          upload-snapshots: true
