# DIAGNOSTIC (manual only): is the x86_64 encoder divergence upstream ISA
# behavior, or an relm bug?
#
# THE QUESTION. On the founder's M4, relm's image-encoder output matches the
# reference produced by the PRISTINE upstream b9726 build bit-for-bit
# (max |Δ| = 0.000e0 over 98304 values). On ubuntu-24.04, relm's output diverges
# from that SAME reference by cos = 0.9955, max |Δ| = 8.714 — far past anything
# "float noise" explains. But that comparison is relm-on-x86 vs upstream-on-arm64:
# it conflates two causes that must be separated before any threshold is set.
#
#   (a) upstream llama.cpp itself computes different floats on x86 than on arm64
#       -> relm is correct everywhere; the cross-machine cosine leg is comparing
#          ISAs, and a reference recorded on one ISA cannot gate another.
#   (b) relm's engine computes something different from upstream ON x86
#       -> a real bug on a platform we SHIP (the r-universe Linux binaries), and
#          v0.2.0 must not ship Linux vision until it is fixed.
#
# THE EXPERIMENT. Build the pristine b9726 tarball on THIS x86_64 runner, run the
# same dump-encode harness that produced the committed reference, and compare
# relm-on-x86 against upstream-on-x86 — same machine, same kernels, same
# everything except the implementation. That isolates (b) from (a):
#
#   bit-exact (or ~1e-6)  => (a): pure ISA. relm is faithful on x86.
#   diverges              => (b): an relm x86 encoder bug. STOP the release.
#
# It also prints upstream-x86 vs upstream-arm64 (the committed reference), which
# measures the ISA gap on its own — the number the cosine floor would have to
# tolerate if (a) holds.
#
# Manual only: this is a question-answering job, not a gate. Delete it once the
# answer is recorded in DECISIONS.md.
name: diag-vision-encoder-isa.yaml

on:
  workflow_dispatch: {}

permissions: read-all

jobs:
  encoder-isa:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      TARBALL_URL: https://github.com/ggml-org/llama.cpp/archive/refs/tags/b9726.tar.gz
      TARBALL_SHA256: 117e95a59967e91b097d1bfdf62c3d10e8d08aec01be8548a093dcceecf9f2e0
      MODEL_URL: https://huggingface.co/ggml-org/Qwen2-VL-2B-Instruct-GGUF/resolve/bb307c036e8a1ed7b663bbd0c35b41c4c9294cfd/Qwen2-VL-2B-Instruct-Q4_K_M.gguf
      MODEL_SHA256: 5745685d2e607a82a0696c1118e56a2a1ae0901da450fd9cd4f161c6b62867d7
      MMPROJ_URL: https://huggingface.co/ggml-org/Qwen2-VL-2B-Instruct-GGUF/resolve/bb307c036e8a1ed7b663bbd0c35b41c4c9294cfd/mmproj-Qwen2-VL-2B-Instruct-f16.gguf
      MMPROJ_SHA256: ecb20cabcdd8dbc277de06bd6eb980aeb2adfaaba9f199a434e328d205675d03

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Report the runner CPU (the whole point is which kernels ggml picks)
        run: |
          lscpu | grep -iE "model name|architecture|flags" | cut -c1-400 || true

      - name: Fetch the pinned model pair (fail-closed)
        shell: bash
        run: |
          set -euo pipefail
          fetch() {
            curl -fL --retry 3 --retry-delay 5 -o "$3" "$1"
            got="$(sha256sum "$3" | awk '{print $1}')"
            [ "$got" = "$2" ] || { rm -f "$3"; echo "::error::SHA256 mismatch for $3"; exit 1; }
            echo "verified: $got  $3"
          }
          fetch "$MODEL_URL"  "$MODEL_SHA256"  "$RUNNER_TEMP/model.gguf"
          fetch "$MMPROJ_URL" "$MMPROJ_SHA256" "$RUNNER_TEMP/mmproj.gguf"

      - name: Build the PRISTINE upstream b9726 (SHA-verified tarball, CPU-only)
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP"
          curl -fL --retry 3 -o llama.tar.gz "$TARBALL_URL"
          got="$(sha256sum llama.tar.gz | awk '{print $1}')"
          if [ "$got" != "$TARBALL_SHA256" ]; then
            echo "::error::pristine tarball SHA256 mismatch (got $got); the reference would be meaningless"
            exit 1
          fi
          echo "pristine tarball verified: $got"
          tar xzf llama.tar.gz
          mv llama.cpp-b9726 pristine
          cd pristine
          # The same cmake line the committed reference was built with
          # (tests/llm-golden/vision/README.md), CPU-only for comparability.
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
                -DGGML_METAL=OFF -DGGML_BLAS=OFF -DGGML_OPENMP=OFF \
                -DLLAMA_BUILD_TOOLS=ON -DLLAMA_BUILD_COMMON=ON \
                -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_EXAMPLES=OFF \
                -DLLAMA_BUILD_SERVER=OFF -DLLAMA_CURL=OFF > /dev/null
          cmake --build build --target llama-mtmd-cli -j 4 > /dev/null
          echo "pristine build done"

      - name: Produce the upstream-on-x86 reference with the committed harness
        shell: bash
        run: |
          set -euo pipefail
          REF="$RUNNER_TEMP/pristine"
          cc -O2 -o "$RUNNER_TEMP/dump-encode" tests/llm-golden/vision/tools/dump-encode.c \
             -I"$REF/include" -I"$REF/ggml/include" -I"$REF/tools/mtmd" \
             -L"$REF/build/bin" -lmtmd -lllama -lggml -Wl,-rpath,"$REF/build/bin"
          "$RUNNER_TEMP/dump-encode" "$RUNNER_TEMP/model.gguf" "$RUNNER_TEMP/mmproj.gguf" \
             tests/vision/red-square.png "$RUNNER_TEMP/upstream-x86.txt"
          echo "upstream-x86 reference: $(head -1 "$RUNNER_TEMP/upstream-x86.txt")"

      - name: Produce relm-on-x86 through the same FFI the goldens use
        shell: bash
        env:
          RELM_TEST_MODEL_VLM: ${{ runner.temp }}/model.gguf
          RELM_TEST_MMPROJ_VLM: ${{ runner.temp }}/mmproj.gguf
          RELM_DUMP_ENCODER_TO: ${{ runner.temp }}/relm-x86.txt
        working-directory: rebirth/src/rust
        run: |
          set -euo pipefail
          # The dump seam lives behind an env var in the golden test itself, so
          # this uses the exact code path the [MODEL] leg exercises.
          cargo test -p rebirth-llm --release --test vlm_golden \
            encoder_output_matches -- --nocapture 2>&1 | tail -5 || true
          ls -la "$RELM_DUMP_ENCODER_TO"

      - name: THE ANSWER — relm-x86 vs upstream-x86 (same machine), and the ISA gap
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os, math

          def load(p):
              with open(p) as f:
                  n, d = (int(x) for x in f.readline().split())
                  v = [float(line) for line in f]
              assert len(v) == n * d, f"{p}: shape {n}x{d} != {len(v)} values"
              return v

          tmp = os.environ["RUNNER_TEMP"]
          relm_x86     = load(f"{tmp}/relm-x86.txt")
          upstream_x86 = load(f"{tmp}/upstream-x86.txt")
          upstream_arm = load("tests/llm-golden/vision/goldens/encode-red-square-f32.txt")

          def stats(a, b):
              mx = max(abs(x - y) for x, y in zip(a, b))
              dot = sum(x * y for x, y in zip(a, b))
              na = math.sqrt(sum(x * x for x in a))
              nb = math.sqrt(sum(y * y for y in b))
              return mx, dot / (na * nb)

          same_machine = stats(relm_x86, upstream_x86)
          isa_gap      = stats(upstream_x86, upstream_arm)
          vs_committed = stats(relm_x86, upstream_arm)

          print("=" * 72)
          print("relm-x86   vs upstream-x86   (SAME machine -> implementation only)")
          print(f"    max |d| = {same_machine[0]:.6e}   cos = {same_machine[1]:.9f}")
          print("upstream-x86 vs upstream-arm (SAME code    -> ISA only)")
          print(f"    max |d| = {isa_gap[0]:.6e}   cos = {isa_gap[1]:.9f}")
          print("relm-x86   vs upstream-arm   (what the nightly was comparing)")
          print(f"    max |d| = {vs_committed[0]:.6e}   cos = {vs_committed[1]:.9f}")
          print("=" * 72)

          if same_machine[0] <= 1e-3:
              print("VERDICT (a): relm is FAITHFUL to upstream on x86_64.")
              print("  The nightly's divergence is upstream's own ISA behavior.")
              print("  => a reference from one machine cannot gate another; the")
              print(f"     cosine floor must tolerate an ISA gap of cos={isa_gap[1]:.9f}.")
          else:
              print("VERDICT (b): relm DIVERGES from upstream on the SAME machine.")
              print("  This is an relm x86_64 encoder bug, not ISA noise.")
              print("  => STOP: Linux is a shipped platform (r-universe binaries).")
              raise SystemExit(1)
          PY
