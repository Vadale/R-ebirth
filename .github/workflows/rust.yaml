# Native-workspace and test-tooling checks (no R, no models).
# - cargo:  fmt / clippy / test for the R-free engine crate rebirth-llm.
# - golden: Harness B numpy reference self-check (the exact-value oracle).
# Both download only pinned tooling; neither downloads a model.
on:
  push:
    branches: [main, master]
  pull_request:

name: rust.yaml

permissions: read-all

jobs:
  cargo:
    runs-on: ubuntu-24.04
    name: cargo fmt / clippy / test

    defaults:
      run:
        working-directory: rebirth/src/rust

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # rebirth-ffi is the extendr boundary crate: building it requires R (the
      # extendr-ffi build script locates R). This R-free job therefore builds,
      # tests, and lints only rebirth-llm — which proves the engine crate stays
      # R-free and independently testable (ARCHITECTURE.md §2). rebirth-ffi is
      # compiled and validated by the R-CMD-check workflow (which sets up R);
      # full-workspace clippy under R is wired in a later WP1 step.
      - name: cargo fmt --check (whole workspace)
        run: cargo fmt --all --check

      - name: cargo clippy (R-free engine crate; deny warnings)
        run: cargo clippy -p rebirth-llm --all-targets -- -D warnings

      - name: cargo test (R-free engine crate)
        run: cargo test -p rebirth-llm

  # Harness B, part (b): the numpy reference oracle must be deterministic and
  # still agree with the committed logit goldens and the committed synthetic
  # GGUF. Part (a) — the GGUF loads via rebirth::llm() with the right dims — runs
  # in R-CMD-check.yaml via tests/testthat/test-llm-synthetic.R. This job installs
  # only the pinned golden tooling (numpy + gguf); it downloads no model.
  golden:
    runs-on: ubuntu-24.04
    name: harness B golden self-check

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: install pinned golden tooling (test-only, not a package dep)
        run: pip install -r tests/llm-golden/requirements.txt

      - name: reference forward self-check (determinism + goldens + GGUF)
        run: python tests/llm-golden/synthetic/reference_forward.py --check
