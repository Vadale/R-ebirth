# Native-workspace and test-tooling checks (no R, no models).
# - cargo:         fmt / clippy / test for the R-free engine crate rebirth-llm,
#                  incl. the --no-default-features (no-spill) config.
#                  (rebirth-ffi needs R, so its tests run in R-CMD-check.yaml.)
# - golden:        Harness B numpy reference self-check (the exact-value oracle).
# - vendored-tree: the committed patched llama.cpp tree hashes to VENDORING.md's
#                  post-patch SHA (D-008 gate G4) and patches/*.diff reverse-apply
#                  to the pre-patch SHA (D-015 coherence).
# All download only pinned tooling; none downloads a model.
on:
  push:
    branches: [main, master]
  pull_request:

name: rust.yaml

permissions: read-all

jobs:
  cargo:
    runs-on: ubuntu-24.04
    name: cargo fmt / clippy / test

    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      CMAKE_C_COMPILER_LAUNCHER: "sccache"
      CMAKE_CXX_COMPILER_LAUNCHER: "sccache"

    defaults:
      run:
        working-directory: rebirth/src/rust

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Cache the vendored llama.cpp (cmake C++) + Rust compilation across runs,
      # keyed by content hash. RUSTC_WRAPPER + CMAKE_*_COMPILER_LAUNCHER (see env)
      # route rustc and the engine's cmake build through sccache; the GHA backend
      # stores the cache. The dominant CI cost is recompiling llama.cpp each run.
      - name: sccache (compiler cache)
        uses: mozilla-actions/sccache-action@v0.0.9

      # rebirth-ffi is the extendr boundary crate: building it requires R (the
      # extendr-ffi build script locates R). This R-free job therefore builds,
      # tests, and lints only rebirth-llm — which proves the engine crate stays
      # R-free and independently testable (ARCHITECTURE.md §2). rebirth-ffi is
      # compiled and validated by the R-CMD-check workflow (which sets up R);
      # full-workspace clippy under R is wired in a later WP1 step.
      - name: cargo fmt --check (whole workspace)
        run: cargo fmt --all --check

      - name: cargo clippy (R-free engine crate; deny warnings)
        run: cargo clippy -p rebirth-llm --all-targets -- -D warnings

      # Includes the exact-value engine-vs-oracle logit check (WP2 Step 1,
      # tests/synthetic_logits.rs): the built engine's teacher-forced logits on
      # the committed synthetic GGUF must match the numpy oracle golden within
      # the documented F32-vs-F64 tolerance. Download-free, synthetic-only.
      - name: cargo test (R-free engine crate)
        run: cargo test -p rebirth-llm

      # The no-spill configuration (--no-default-features drops the `spill` feature
      # in both crates, D-013) must stay compilable and green: its
      # #[cfg(not(feature = "spill"))] arm has no other CI coverage and would
      # otherwise rot. Build + test (not just check) -- the spill-only tests are
      # #![cfg(feature = "spill")]-gated, so they compile out here.
      - name: cargo test (R-free engine crate, no-spill config)
        run: cargo test -p rebirth-llm --no-default-features

  # Harness B, part (b): the numpy reference oracle must be deterministic and
  # still agree with the committed logit goldens and the committed synthetic
  # GGUF. Part (a) — the GGUF loads via rebirth::llm() with the right dims — runs
  # in R-CMD-check.yaml via tests/testthat/test-llm-synthetic.R. This job installs
  # only the pinned golden tooling (numpy + gguf); it downloads no model.
  golden:
    runs-on: ubuntu-24.04
    name: harness B golden self-check

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: install pinned golden tooling (test-only, not a package dep)
        run: pip install -r tests/llm-golden/requirements.txt

      - name: reference forward self-check (determinism + goldens + GGUF)
        run: python tests/llm-golden/synthetic/reference_forward.py --check

  # D-008 gate G4 + D-015 patch coherence: prove the committed, patched vendored
  # llama.cpp tree still hashes to the recorded post-patch SHA256 (a silent engine
  # change fails here) and that patches/*.diff reverse-apply to the pre-patch
  # SHA256 (the committed tree and the diff cannot drift apart). No Rust, no model.
  vendored-tree:
    runs-on: ubuntu-24.04
    name: vendored tree integrity (G4 + patch coherence)

    steps:
      - uses: actions/checkout@v4

      - name: verify vendored llama.cpp tree SHA256 + patch coherence
        run: sh rebirth/src/llama.cpp/patches/verify_vendored_tree.sh
