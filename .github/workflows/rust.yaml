# Cargo checks for the native workspace under rust/ (rebirth-ffi, rebirth-llm).
# Formatting, linting (warnings are errors), and tests. Downloads no models.
on:
  push:
    branches: [main, master]
  pull_request:

name: rust.yaml

permissions: read-all

jobs:
  cargo:
    runs-on: ubuntu-24.04
    name: cargo fmt / clippy / test

    defaults:
      run:
        working-directory: rebirth/src/rust

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # rebirth-ffi is the extendr boundary crate: building it requires R (the
      # extendr-ffi build script locates R). This R-free job therefore builds,
      # tests, and lints only rebirth-llm — which proves the engine crate stays
      # R-free and independently testable (ARCHITECTURE.md §2). rebirth-ffi is
      # compiled and validated by the R-CMD-check workflow (which sets up R);
      # full-workspace clippy under R is wired in a later WP1 step.
      - name: cargo fmt --check (whole workspace)
        run: cargo fmt --all --check

      - name: cargo clippy (R-free engine crate; deny warnings)
        run: cargo clippy -p rebirth-llm --all-targets -- -D warnings

      - name: cargo test (R-free engine crate)
        run: cargo test -p rebirth-llm
